# RubyShards Configuration

# The name of the AFK world (must match exactly as shown in /mv list)
afk-world: "afk"

# Rubies earned per minute in normal worlds
rubies-per-minute-normal: 1

# Rubies earned per minute in the AFK world
rubies-per-minute-afk: 5

# How many rubies = 1 extra claim block in GriefPrevention
rubies-per-claim-block: 10

# Messages (supports & color codes)
messages:
  balance-self: "&6Your Rubies: &e{rubies} 💎"
  balance-other: "&6{player}'s Rubies: &e{rubies} 💎"
  rubies-earned: "&aYou earned &e{amount} &aruby! &7(Total: &e{total}&7)"
  admin-give: "&aGave &e{amount} &arubies to &e{player}&a."
  admin-take: "&cTook &e{amount} &crubies from &e{player}&c."
  admin-set: "&aSet &e{player}&a's rubies to &e{amount}&a."
  no-permission: "&cYou don't have permission to do that."
  player-not-found: "&cPlayer not found."
  invalid-amount: "&cPlease enter a valid amount."
