name: RubyShards
version: 1.0.0
main: com.nifesmp.rubyshards.RubyShards
api-version: 1.21
author: NifeSMP
description: Ruby earning system with GriefPrevention integration

softdepend:
  - PlaceholderAPI
  - GriefPrevention

commands:
  rubies:
    description: Check your ruby balance
    usage: /rubies [player]
    aliases: [ruby, balance]
  rubyadmin:
    description: Admin commands for rubies
    usage: /rubyadmin <give|set|take> <player> <amount>

permissions:
  rubyshards.admin:
    description: Access to admin ruby commands
    default: op
  rubyshards.check.others:
    description: Check other players ruby balances
    default: op
